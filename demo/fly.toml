# Fly.io configuration for Sykehus
# Generated by Waystones
#
# Deploy:
#   fly launch --copy-config    (first time)
#   fly deploy                  (subsequent)

app = "sykehus-pygeoapi"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  # FIX: Pre-populated since Fly app names are deterministic.
  # Update if you configure a custom domain.
  PYGEOAPI_SERVER_URL = "https://sykehus-pygeoapi.fly.dev"
  # Fly routes to internal_port (8080) below — PORT env var is not used by Fly.
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/conformance"
    interval = "30s"
    timeout = "5s"

[mounts]
  source = "geodata"
  destination = "/data"
