# pygeoapi configuration for fmedata
# Generated: 2026-03-25T10:34:13.777Z
# Source: geopackage

server:
  bind:
    host: 0.0.0.0
    port: ${PORT:-80}
  url: ${PYGEOAPI_SERVER_URL}
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  languages:
    - nb-NO
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  limits:
    default_items: 10
    max_items: 10000
  templates:
    path: /pygeoapi/local-templates

logging:
  level: INFO

metadata:
  identification:
    title: fmedata
    description: Test
    url: https://example.com/dataset
    terms_of_service: https://example.com/terms
    keywords:
      - geospatial
      - data
  license:
    name: CC-BY-4.0
    url: https://creativecommons.org/licenses/by/4.0/
  contact:
    name: Henrik
    email: schhen@kartverket.no
  provider:
    name: Henrik
    organization: Kartverket
    email: schhen@kartverket.no

resources:
  roads:
    type: collection
    title: roads
    description: Spatial collection
    keywords:
      - data
      - roads
    extents:
      spatial:
        bbox: [-180, -90, 180, 90]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: SQLiteGPKG
        data: /data/fmedata-db
        table: roads
        id_field: id
        geom_field: geom
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/4326
        extensions:
          filters:
            - cql2-text
            - cql2-json
            - cql-text

    schema:
      # Resolved properties for roads (Local: 5, Total: 5)
      # Generator Version: 1.0.2
      title: "roads"
      type: object
      properties:
        "waystones_ping":
          title: "Waystones Connection Check"
          type: string
        "streetid":
          title: "Streetid"
          type: number
        "streetname":
          title: "Streetname"
          type: string
        "from_hblock":
          title: "From hblock"
          type: string
        "hblock":
          title: "Hblock"
          type: string
        "type":
          title: "Type"
          type: string

