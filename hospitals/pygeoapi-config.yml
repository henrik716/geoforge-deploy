# pygeoapi configuration for Hospitals
# Generated: 2026-03-24T06:47:31.379Z
# Source: geopackage

server:
  bind:
    host: 0.0.0.0
    port: ${PORT:-80}
  url: ${PYGEOAPI_SERVER_URL}
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  languages:
    - nb-NO
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  limits:
    default_items: 10
    max_items: 10000
  templates:
    path: /pygeoapi/local-templates

logging:
  level: INFO

metadata:
  identification:
    title: Hospitals
    description: Dette datasettet inneholder geografiske punktrepresentasjoner av sykehus og tilhørende arealobjekter. Hvert sykehuspunkt gir detaljer om institusjonens navn, type og om det tilbyr akuttmottak. Arealobjektene kan representere sykehusområder eller tilhørende geografiske regioner. Formålet med datasettet er å fasilitere lokalisering og analyse av helseinstitusjoner basert på deres funksjonalitet og geografiske utbredelse.
    url: https://example.com/dataset
    terms_of_service: https://example.com/terms
    keywords:
      - Sykehus
      - Helsevesen
      - Helsetjenester
      - Medisinske fasiliteter
      - Lokasjoner
      - Infrastruktur
      - Akuttjenester
      - Helseinstitusjoner
  license:
    name: CC-BY-4.0
    url: https://creativecommons.org/licenses/by/4.0/
  contact:
    name: Henrik Schüller
    email: schhen@kartverket.no
  provider:
    name: Henrik Schüller
    organization: Kartverket
    email: schhen@kartverket.no

resources:
  hospitalpoints:
    type: collection
    title: hospitalpoints
    description: Dette datasettet inneholder geografiske punktrepresentasjoner av sykehus og tilhørende arealobjekter. Hvert sykehuspunkt gir detaljer om institusjonens navn, type og om det tilbyr akuttmottak. Arealobjektene kan representere sykehusområder eller tilhørende geografiske regioner. Formålet med datasettet er å fasilitere lokalisering og analyse av helseinstitusjoner basert på deres funksjonalitet og geografiske utbredelse.
    keywords:
      - data
      - hospitalpoints
    extents:
      spatial:
        bbox: [5.661964614014777, 58.01289713711848, 38.86783938382364, 77.15419161001824]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: SQLiteGPKG
        data: /data/Hospitals.gpkg
        table: hospitalpoints
        id_field: fid
        geom_field: geom
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833

  areas:
