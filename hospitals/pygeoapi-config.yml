# pygeoapi configuration for Hospitals
# Generated: 2026-03-23T14:09:08.933Z
# Source: geopackage

server:
  bind:
    host: 0.0.0.0
    port: ${PORT:-80}
  url: ${PYGEOAPI_SERVER_URL}
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  languages:
    - nb-NO
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  limits:
    default_items: 10
    max_items: 10000
  templates:
    path: /pygeoapi/local-templates

logging:
  level: INFO

metadata:
  identification:
    title: Hospitals
    description: Dette datasettet inneholder geografisk informasjon om sykehus, presentert som punktdata for enkeltlokasjoner og flatedata for større sykehusområder. Hovedformålet er å visualisere og analysere sykehusenes geografiske fordeling og funksjonalitet. Punktlaget inkluderer nøkkelattributter som sykehusets navn, type (f.eks. lokalsykehus, regionsykehus) og indikasjon på om det har et akuttmottak. Flatedataene gir kontekst for sykehusenes fysiske utbredelse.
    url: https://example.com/dataset
    terms_of_service: https://example.com/terms
    keywords:
      - sykehus
      - helse
      - helsevesen
      - medisin
      - lokalisering
      - infrastruktur
      - fasiliteter
      - hjklø
  license:
    name: CC-BY-4.0
    url: https://creativecommons.org/licenses/by/4.0/
  contact:
    name: Henrik Schuller
    email: post@kartverket.no
  provider:
    name: Henrik Schuller
    organization: Kartverket
    email: post@kartverket.no

resources:
  hospitalpoints:
    type: collection
    title: hospitalpoints
    description: Spatial collection
    keywords:
      - data
      - hospitalpoints
    extents:
      spatial:
        bbox: [5.661964614014777, 58.01289713711848, 38.86783938382364, 77.15419161001824]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: SQLiteGPKG
        data: /data/Hospitals.gpkg
        table: hospitalpoints
        id_field: fid
        geom_field: geom
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833

  areas:
    type: collection
    title: areas
    description: Spatial collection
    keywords:
      - data
      - areas
    extents:
      spatial:
        bbox: [5.661964614014777, 58.01289713711848, 38.86783938382364, 77.15419161001824]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: SQLiteGPKG
        data: /data/Hospitals.gpkg
        table: areas
        id_field: fid
        geom_field: geom
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833

