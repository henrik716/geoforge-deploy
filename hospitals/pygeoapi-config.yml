# pygeoapi configuration for Hospitals
# Generated: 2026-03-18T13:19:56.398Z
# Source: geopackage

server:
  bind:
    host: 0.0.0.0
    port: ${PORT:-80}
  url: ${PYGEOAPI_SERVER_URL}
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  languages:
    - nb-NO
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  limits:
    default_items: 10
    max_items: 10000

logging:
  level: INFO

metadata:
  identification:
    title: Hospitals
    description: Dette datasettet presenterer geografiske punktobjekter som representerer sykehus, supplert med tilhørende områdedata. Hovedformålet er å gi en oversikt over sykehusfasiliteter for å støtte helseplanlegging, beredskap og informere publikum. For hvert sykehuspunkt er nøkkelattributter som sykehusets navn, type og tilgjengelighet av akuttmottak inkludert. Datasettet er essensielt for å forstå distribusjonen av helsetjenester og planlegge for fremtidige behov.
    url: https://example.com/dataset
    terms_of_service: https://example.com/terms
    keywords:
      - sykehus
      - helse
      - helsevesen
      - medisin
      - fasiliteter
      - steder
      - omsorg
  license:
    name: CC-BY-4.0
    url: https://creativecommons.org/licenses/by/4.0/
  contact:
    name: Henrik S
    email: schhen@kartverket.no
  provider:
    name: Henrik S
    organization: kasdas
    email: schhen@kartverket.no

resources:
  hospitalpoints:
    type: collection
    title: hospitalpoints
    description: Spatial collection
    keywords:
      - data
      - hospitalpoints
    extents:
      spatial:
        bbox: [5.661964614014777, 58.01289713711848, 38.86783938382364, 77.15419161001824]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: SQLiteGPKG
        data: /data/Hospitals.gpkg
        table: hospitalpoints
        id_field: fid
        geom_field: geom
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833

  areas:
    type: collection
    title: areas
    description: Spatial collection
    keywords:
      - data
      - areas
    extents:
      spatial:
        bbox: [5.661964614014777, 58.01289713711848, 38.86783938382364, 77.15419161001824]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: SQLiteGPKG
        data: /data/Hospitals.gpkg
        table: areas
        id_field: fid
