# pygeoapi configuration for Hospitals
# Generated: 2026-03-13T11:12:02.819Z
# Source: geopackage

server:
  bind:
    host: 0.0.0.0
    port: ${PORT:-80}
  url: ${PYGEOAPI_SERVER_URL}
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  languages:
    - nb-NO
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  limits:
    default_items: 10
    max_items: 10000

logging:
  level: INFO

metadata:
  identification:
    title: Hospitals
    description: Dette datasettet presenterer geografisk informasjon om sykehus, primært representert som punktgeometrier. Hovedformålet er å gi en oversikt over og lokalisere helseinstitusjoner for planlegging, ressursallokering og tilgang til medisinske tjenester. Hvert sykehuspunkt inkluderer viktige attributter som sykehusets navn, type (f.eks. universitetssykehus, lokalsykehus) og indikasjon på tilgjengelighet av akuttmottak. Datasettet er et sentralt verktøy for krisehåndtering, samfunnsplanlegging og generell orientering om helsetilbud.
    url: https://example.com/dataset
    terms_of_service: https://example.com/terms
    keywords:
      - sykehus
      - helsetjenester
      - helsevesen
      - medisin
      - klinikker
      - lokasjoner
      - helseregioner
      - fasiliteter
  license:
    name: CC-BY-4.0
    url: https://creativecommons.org/licenses/by/4.0/
  contact:
    name: Henrik Schüller
    email: post@kartverket.no
  provider:
    name: Henrik Schüller
    organization: Kartverket
    email: post@kartverket.no

resources:
  hospitalpoints:
    type: collection
    title: hospitalpoints
    description: Spatial collection
    keywords:
      - data
      - hospitalpoints
    extents:
      spatial:
        bbox: [5.661964614014777, 58.01289713711848, 38.86783938382364, 77.15419161001824]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: SQLiteGPKG
        data: /data/Hospitals.gpkg
        table: hospitalpoints
        id_field: fid
