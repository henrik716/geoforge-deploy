metadata:
  identification:
    title: Sykehus
    description: Dette datasettet inneholder geografisk informasjon om sykehus, primært representert som punktobjekter. Hovedformålet er å tilgjengeliggjøre lokalisering og grunnleggende kjennetegn ved sykehus for bruk i helseplanlegging, beredskapsarbeid og offentlig informasjonsformidling. For hvert sykehuspunkt er sentrale attributter tilgjengelige, inkludert sykehusets navn, type (f.eks. spesialsykehus, lokalsykehus) og informasjon om tilstedeværelse av akuttmottak.
    url: https://example.com/dataset
    terms_of_service: https://example.com/terms
    keywords:
      - sykehus
      - helse
      - helsevesen
      - helseinstitusjoner
      - medisin
      - behandling
      - fasiliteter
  license:
    name: CC-BY-4.0
    url: https://creativecommons.org/licenses/by/4.0/
  contact:
    name: Henrik S
    email: post@kartverket.no
  provider:
    name: Henrik S
    organization: Kartverket
    email: post@kartverket.no

resources:
  hospitalpoints:
    type: collection
    title: Punkter
    description: Denne punktgeometrien representerer sykehuslokasjoner, og gir en oversikt over viktig helseinfrastruktur. Laget inneholder attributter som sykehusnavn, type, tilstedeværelse av akuttmottak, samt antall leger og sykepleiere, noe som er nyttig for analyse og planlegging.
    keywords:
      - sykehus
      - helsefasiliteter
      - medisin
      - akuttmottak
      - kapasitet
    extents:
      spatial:
        bbox: [-180, -90, 180, 90]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: SQLiteGPKG
        data: /data/Hospitals.gpkg
        table: hospitalpoints
        id_field: fid
        geom_field: geom
        storage_crs: http://www.opengis.net/def/crs/EPSG/0/25833
